<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Price Drop Tracker — Flow</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #252525; --border: #333;
  --text: #fff; --muted: #aaa; --accent: #f59e0b; --accent2: #ff6b35;
  --green: #10b981; --red: #ef4444; --radius: 12px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
.container { max-width: 700px; margin: 0 auto; }
a.back { position: absolute; top: 1.5rem; left: 1.5rem; color: var(--muted); text-decoration: none; font-size: 0.85rem; }
a.back:hover { color: var(--text); }
.header { text-align: center; margin-bottom: 2rem; }
.header h1 { font-size: 1.8rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header p { color: var(--muted); font-size: 0.85rem; margin-top: 0.3rem; }

/* Cards */
.product-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; }
.product-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; position: relative; transition: border-color 0.2s; }
.product-card:hover { border-color: var(--accent); }
.product-card.disabled { opacity: 0.5; }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
.card-title { font-weight: 600; font-size: 1rem; }
.card-store { font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
.card-store.shopee { background: rgba(238,77,45,0.15); color: #ee4d2d; }
.card-store.lazada { background: rgba(15,22,120,0.15); color: #6c7ae0; }
.card-meta { display: flex; gap: 1.5rem; font-size: 0.82rem; color: var(--muted); margin-bottom: 0.75rem; }
.card-meta strong { color: var(--text); }
.card-actions { display: flex; gap: 0.5rem; }
.card-actions button { padding: 0.4rem 0.8rem; border: 1px solid var(--border); border-radius: 6px; background: var(--surface2); color: var(--text); font-size: 0.75rem; cursor: pointer; transition: all 0.15s; }
.card-actions button:hover { border-color: var(--accent); color: var(--accent); }
.card-actions button.remove:hover { border-color: var(--red); color: var(--red); }
.card-link { color: var(--accent); font-size: 0.75rem; text-decoration: none; word-break: break-all; }
.card-link:hover { text-decoration: underline; }

/* Chart area */
.chart-container { background: var(--surface2); border-radius: 8px; padding: 1rem; margin-top: 0.75rem; height: 150px; position: relative; }
.no-history { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 0.8rem; }
.price-stats { display: flex; gap: 1rem; margin-top: 0.5rem; font-size: 0.75rem; color: var(--muted); }
.price-stats span strong { color: var(--text); }

/* Add form */
.add-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 2rem; }
.add-section h3 { font-size: 0.95rem; margin-bottom: 1rem; }
.form-row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
.form-row input, .form-row select { flex: 1; padding: 0.7rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 0.85rem; outline: none; }
.form-row input:focus, .form-row select:focus { border-color: var(--accent); }
.form-row select { max-width: 130px; }
.btn-add { width: 100%; padding: 0.75rem; border: none; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: opacity 0.2s; }
.btn-add:hover { opacity: 0.9; }
.btn-add:disabled { background: #333; color: #666; cursor: not-allowed; }
.form-error { color: var(--red); font-size: 0.75rem; margin-top: 0.3rem; display: none; }
.form-error.show { display: block; }
.limit-msg { text-align: center; color: var(--accent); font-size: 0.8rem; padding: 0.5rem; }

/* Export */
.export-section { text-align: center; margin-bottom: 2rem; }
.btn-export { padding: 0.6rem 1.5rem; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); font-size: 0.85rem; cursor: pointer; transition: all 0.15s; }
.btn-export:hover { border-color: var(--green); color: var(--green); }

/* Error state */
.error-state { text-align: center; padding: 3rem; color: var(--muted); }
.footer { text-align: center; color: #444; font-size: 0.72rem; margin-top: 3rem; }
</style>
</head>
<body>
<a href="../" class="back">← Back to Flow</a>
<div class="container">
  <div class="header">
    <h1>📉 Price Drop Tracker</h1>
    <p>Monitor Shopee & Lazada prices. Get alerted when prices hit your target.</p>
  </div>

  <div id="productList" class="product-list"></div>

  <div class="add-section" id="addSection">
    <h3>➕ Add Product to Track</h3>
    <div class="form-row">
      <input type="text" id="addName" placeholder="Product name">
      <select id="addStore"><option value="shopee">Shopee</option><option value="lazada">Lazada</option></select>
    </div>
    <div class="form-row">
      <input type="text" id="addUrl" placeholder="Product URL (Shopee or Lazada)">
    </div>
    <div class="form-row">
      <input type="number" id="addTarget" placeholder="Target price (₱)" min="1">
    </div>
    <div class="form-error" id="formError"></div>
    <button class="btn-add" id="btnAdd" onclick="addProduct()">Add to Watchlist</button>
    <div class="limit-msg" id="limitMsg" style="display:none">Maximum 5 products reached</div>
  </div>

  <div class="export-section">
    <button class="btn-export" onclick="exportJSON()">💾 Download Updated Watchlist JSON</button>
  </div>

  <div class="footer">Flow · Price Drop Tracker · Checks every 30 minutes via Task Scheduler</div>
</div>

<script>
let watchlist = { products: [] };
let history = {};
const MAX_PRODUCTS = 5;

// Paths — adjust if hosted differently
const WATCHLIST_PATH = '../scrapers/price_watchlist.json';
const HISTORY_PATH = '../scrapers/price_history.json';

async function init() {
  try {
    const wlRes = await fetch(WATCHLIST_PATH);
    if (wlRes.ok) watchlist = await wlRes.json();
  } catch(e) { console.warn('Could not load watchlist:', e); }

  try {
    const hRes = await fetch(HISTORY_PATH);
    if (hRes.ok) history = await hRes.json();
  } catch(e) { console.warn('Could not load history:', e); }

  render();
}

function render() {
  const list = document.getElementById('productList');
  list.innerHTML = '';

  if (watchlist.products.length === 0) {
    list.innerHTML = '<div class="error-state">No products tracked yet. Add one below.</div>';
  }

  watchlist.products.forEach((p, idx) => {
    const disabled = p.enabled === false;
    const histEntries = history[p.url] || [];
    const lastPrice = histEntries.length > 0 ? histEntries[histEntries.length-1].price : null;
    const minPrice = histEntries.length > 0 ? Math.min(...histEntries.map(h=>h.price)) : null;
    const maxPrice = histEntries.length > 0 ? Math.max(...histEntries.map(h=>h.price)) : null;

    const card = document.createElement('div');
    card.className = `product-card${disabled ? ' disabled' : ''}`;
    card.innerHTML = `
      <div class="card-header">
        <span class="card-title">${escHtml(p.name)}</span>
        <span class="card-store ${p.store}">${p.store}</span>
      </div>
      <div class="card-meta">
        <span>🎯 Target: <strong>₱${Number(p.target_price).toLocaleString()}</strong></span>
        ${lastPrice !== null ? `<span>💰 Last: <strong>₱${lastPrice.toLocaleString()}</strong></span>` : ''}
        <span>Status: <strong>${disabled ? '⏸ Paused' : '✅ Active'}</strong></span>
      </div>
      <a href="${escHtml(p.url)}" target="_blank" class="card-link">${escHtml(p.url.substring(0,60))}...</a>
      <div class="chart-container"><canvas id="chart-${idx}"></canvas>${histEntries.length === 0 ? '<div class="no-history">No price history yet</div>' : ''}</div>
      ${histEntries.length > 0 ? `<div class="price-stats"><span>Lowest: <strong>₱${minPrice.toLocaleString()}</strong></span><span>Highest: <strong>₱${maxPrice.toLocaleString()}</strong></span><span>Checks: <strong>${histEntries.length}</strong></span></div>` : ''}
      <div class="card-actions" style="margin-top:0.75rem">
        <button onclick="toggleProduct(${idx})">${disabled ? '▶ Enable' : '⏸ Disable'}</button>
        <button onclick="editTarget(${idx})">✏️ Edit Target</button>
        <button class="remove" onclick="removeProduct(${idx})">🗑 Remove</button>
      </div>
    `;
    list.appendChild(card);

    // Render chart
    if (histEntries.length > 0) {
      setTimeout(() => renderChart(idx, histEntries, p.target_price), 50);
    }
  });

  // Update add button state
  const btnAdd = document.getElementById('btnAdd');
  const limitMsg = document.getElementById('limitMsg');
  if (watchlist.products.length >= MAX_PRODUCTS) {
    btnAdd.disabled = true;
    limitMsg.style.display = 'block';
  } else {
    btnAdd.disabled = false;
    limitMsg.style.display = 'none';
  }
}

function renderChart(idx, entries, target) {
  const canvas = document.getElementById(`chart-${idx}`);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  const labels = entries.map(e => e.checked_at.substring(5, 16));
  const prices = entries.map(e => e.price);
  const targetLine = entries.map(() => target);

  new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Price', data: prices, borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.1)', tension: 0.3, pointRadius: 1, fill: true },
        { label: 'Target', data: targetLine, borderColor: '#10b981', borderDash: [5,5], pointRadius: 0, borderWidth: 1 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { display: false },
        y: { ticks: { color: '#888', font: { size: 10 }, callback: v => '₱'+v.toLocaleString() }, grid: { color: '#2a2a2a' } }
      }
    }
  });
}

function addProduct() {
  const name = document.getElementById('addName').value.trim();
  const url = document.getElementById('addUrl').value.trim();
  const target = parseFloat(document.getElementById('addTarget').value);
  const store = document.getElementById('addStore').value;
  const errEl = document.getElementById('formError');

  errEl.classList.remove('show');

  if (!name) { showFormError('Enter a product name'); return; }
  if (!url) { showFormError('Enter the product URL'); return; }
  if (!url.toLowerCase().includes('shopee') && !url.toLowerCase().includes('lazada')) {
    showFormError('URL must be from Shopee or Lazada'); return;
  }
  if (!target || target <= 0) { showFormError('Enter a valid target price'); return; }
  if (watchlist.products.length >= MAX_PRODUCTS) { showFormError('Max 5 products reached'); return; }

  watchlist.products.push({ name, url, target_price: target, store, enabled: true });
  render();

  document.getElementById('addName').value = '';
  document.getElementById('addUrl').value = '';
  document.getElementById('addTarget').value = '';
}

function toggleProduct(idx) {
  watchlist.products[idx].enabled = !watchlist.products[idx].enabled;
  render();
}

function editTarget(idx) {
  const current = watchlist.products[idx].target_price;
  const newTarget = prompt(`New target price for "${watchlist.products[idx].name}":`, current);
  if (newTarget !== null) {
    const val = parseFloat(newTarget);
    if (val > 0) { watchlist.products[idx].target_price = val; render(); }
    else { alert('Target must be a positive number'); }
  }
}

function removeProduct(idx) {
  const name = watchlist.products[idx].name;
  if (confirm(`Remove "${name}" from watchlist?`)) {
    watchlist.products.splice(idx, 1);
    render();
  }
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(watchlist, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'price_watchlist.json';
  a.click();
  URL.revokeObjectURL(url);
}

function showFormError(msg) {
  const el = document.getElementById('formError');
  el.textContent = msg;
  el.classList.add('show');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>

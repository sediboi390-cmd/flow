<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Price Drop Tracker — Flow</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #252525; --border: #333;
  --text: #fff; --muted: #aaa; --accent: #f59e0b; --accent2: #ff6b35;
  --green: #10b981; --red: #ef4444; --radius: 12px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
.container { max-width: 700px; margin: 0 auto; }
a.back { position: absolute; top: 1.5rem; left: 1.5rem; color: var(--muted); text-decoration: none; font-size: 0.85rem; }
a.back:hover { color: var(--text); }
.header { text-align: center; margin-bottom: 2rem; }
.header h1 { font-size: 1.8rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header p { color: var(--muted); font-size: 0.85rem; margin-top: 0.3rem; }

/* Cards */
.product-list { display: flex; flex-direction: column; gap: 1.25rem; margin-bottom: 2rem; }
.product-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; transition: border-color 0.2s; }
.product-card:hover { border-color: var(--accent); }
.product-card.disabled { opacity: 0.5; }
.card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
.card-title { font-weight: 600; font-size: 1rem; }
.card-badges { display: flex; gap: 0.4rem; align-items: center; }
.badge { font-size: 0.65rem; font-weight: 600; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
.badge.shopee { background: rgba(238,77,45,0.15); color: #ee4d2d; }
.badge.lazada { background: rgba(15,22,120,0.15); color: #6c7ae0; }
.badge.paused { background: rgba(255,255,255,0.08); color: var(--muted); }
.card-url { color: var(--muted); font-size: 0.7rem; margin-bottom: 0.75rem; word-break: break-all; }
.card-url a { color: var(--accent); text-decoration: none; }
.card-url a:hover { text-decoration: underline; }

/* Variants */
.variants-section { margin: 0.75rem 0; }
.variants-title { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.5rem; font-weight: 500; }
.variant-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem; background: var(--surface2); border-radius: 8px; margin-bottom: 0.4rem; font-size: 0.82rem; }
.variant-name { flex: 1; }
.variant-target { color: var(--green); font-weight: 600; }
.variant-actions { display: flex; gap: 0.3rem; }
.variant-actions button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.8rem; padding: 2px 6px; border-radius: 4px; }
.variant-actions button:hover { background: var(--border); color: var(--text); }
.variant-actions button.remove-v:hover { color: var(--red); }

/* Add variant inline */
.add-variant-row { display: flex; gap: 0.4rem; margin-top: 0.5rem; }
.add-variant-row input { flex: 1; padding: 0.45rem 0.6rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 0.8rem; outline: none; }
.add-variant-row input:focus { border-color: var(--accent); }
.add-variant-row button { padding: 0.45rem 0.75rem; border: none; border-radius: 6px; background: var(--accent); color: #000; font-size: 0.75rem; font-weight: 600; cursor: pointer; }
.add-variant-row button:hover { opacity: 0.85; }

/* Card actions */
.card-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
.card-actions button { padding: 0.45rem 0.8rem; border: 1px solid var(--border); border-radius: 6px; background: var(--surface2); color: var(--text); font-size: 0.75rem; cursor: pointer; transition: all 0.15s; }
.card-actions button:hover { border-color: var(--accent); color: var(--accent); }
.card-actions button.remove:hover { border-color: var(--red); color: var(--red); }

/* Add Product Form */
.add-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
.add-section h3 { font-size: 0.95rem; margin-bottom: 1rem; }
.form-row { display: flex; gap: 0.5rem; margin-bottom: 0.6rem; }
.form-row input, .form-row select { flex: 1; padding: 0.7rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 0.85rem; outline: none; }
.form-row input:focus, .form-row select:focus { border-color: var(--accent); }
.form-row select { max-width: 130px; }
.btn-add { width: 100%; padding: 0.75rem; border: none; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-weight: 600; font-size: 0.9rem; cursor: pointer; }
.btn-add:hover { opacity: 0.9; }
.btn-add:disabled { background: #333; color: #666; cursor: not-allowed; }
.form-error { color: var(--red); font-size: 0.75rem; margin-top: 0.4rem; display: none; }
.form-error.show { display: block; }
.form-hint { color: var(--muted); font-size: 0.72rem; margin-top: 0.4rem; }
.limit-msg { text-align: center; color: var(--accent); font-size: 0.8rem; padding: 0.5rem; }

/* Export */
.export-section { text-align: center; margin-bottom: 2rem; }
.btn-export { padding: 0.6rem 1.5rem; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); font-size: 0.85rem; cursor: pointer; transition: all 0.15s; }
.btn-export:hover { border-color: var(--green); color: var(--green); }

.empty-state { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.9rem; }
.footer { text-align: center; color: #444; font-size: 0.72rem; margin-top: 3rem; }
</style>
</head>
<body>
<a href="../" class="back">← Back to Flow</a>
<div class="container">
  <div class="header">
    <h1>📉 Price Drop Tracker</h1>
    <p>Monitor Shopee & Lazada prices. Set target prices per variant.</p>
  </div>

  <div id="productList" class="product-list"></div>

  <div class="add-section" id="addSection">
    <h3>➕ Add Product</h3>
    <div class="form-row">
      <input type="text" id="addName" placeholder="Product name (e.g. DJI Mini 4 Pro)">
      <select id="addStore"><option value="shopee">Shopee</option><option value="lazada">Lazada</option></select>
    </div>
    <div class="form-row">
      <input type="text" id="addUrl" placeholder="Product URL">
    </div>
    <p class="form-hint">You can add variants with individual target prices after creating the product.</p>
    <div class="form-error" id="formError"></div>
    <button class="btn-add" id="btnAdd" onclick="addProduct()">Add Product</button>
    <div class="limit-msg" id="limitMsg" style="display:none">Maximum 5 products reached</div>
  </div>

  <div class="export-section">
    <button class="btn-export" onclick="checkNow()" id="btnCheck" style="background:var(--green);color:#fff;border-color:var(--green)">⚡ Check Prices Now</button>
    <button class="btn-export" onclick="exportJSON()" style="margin-left:0.5rem">💾 Download JSON</button>
    <button class="btn-export" onclick="resetFromFile()" style="margin-left:0.5rem;color:var(--muted)">🔄 Reset</button>
  </div>

  <div id="checkResult" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:1.5rem;font-size:0.75rem;white-space:pre-wrap;max-height:300px;overflow-y:auto;font-family:monospace;color:var(--muted)"></div>

  <div id="autoCheckStatus" style="text-align:center;font-size:0.7rem;color:var(--muted);margin-bottom:1rem"></div>

  <div class="footer">Flow · Price Drop Tracker · Checks every 30 min via Task Scheduler</div>
</div>

<script>
let watchlist = { products: [] };
const MAX_PRODUCTS = 5;
const WATCHLIST_PATH = '../scrapers/price_watchlist.json';
const STORAGE_KEY = 'flow_price_watchlist';
let serverMode = false; // true when local server is running

async function init() {
  // Check if local server is running (enables direct file saving)
  try {
    const ping = await fetch('/api/watchlist', { signal: AbortSignal.timeout(1000) });
    if (ping.ok) {
      serverMode = true;
      watchlist = await ping.json();
      render();
      showServerBadge(true);
      startAutoCheck();
      return;
    }
  } catch(e) { /* server not running, use static mode */ }

  showServerBadge(false);

  // Try localStorage (persists user edits across refreshes)
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try {
      watchlist = JSON.parse(saved);
      render();
      return;
    } catch(e) { console.warn('Invalid localStorage data'); }
  }

  // Fallback: load from JSON file
  try {
    const res = await fetch(WATCHLIST_PATH);
    if (res.ok) watchlist = await res.json();
  } catch(e) { console.warn('Could not load watchlist:', e); }

  saveToLocal();
  render();
}

function saveToLocal() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(watchlist));
}

async function saveWatchlist() {
  if (serverMode) {
    // Save directly to file via server API
    try {
      const res = await fetch('/api/watchlist', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(watchlist)
      });
      if (!res.ok) console.warn('Server save failed');
    } catch(e) { console.warn('Server save error:', e); }
  }
  // Always save to localStorage as backup
  saveToLocal();
}

function showServerBadge(connected) {
  let badge = document.getElementById('serverBadge');
  if (!badge) {
    badge = document.createElement('div');
    badge.id = 'serverBadge';
    badge.style.cssText = 'text-align:center;font-size:0.7rem;padding:0.4rem;margin-bottom:1rem;border-radius:8px;';
    document.querySelector('.header').after(badge);
  }
  if (connected) {
    badge.style.background = 'rgba(16,185,129,0.1)';
    badge.style.color = '#10b981';
    badge.textContent = '🟢 Connected to local server — changes save directly to file';
  } else {
    badge.style.background = 'rgba(245,158,11,0.1)';
    badge.style.color = '#f59e0b';
    badge.textContent = '🟡 Static mode — download JSON after editing to update tracker';
  }
}

function render() {
  const list = document.getElementById('productList');
  list.innerHTML = '';

  if (watchlist.products.length === 0) {
    list.innerHTML = '<div class="empty-state">No products tracked yet. Add one below!</div>';
    updateAddButton();
    return;
  }

  watchlist.products.forEach((p, idx) => {
    const disabled = p.enabled === false;
    const variants = p.variants || [];
    const hasVariants = variants.length > 0;

    let variantsHtml = '';
    if (hasVariants) {
      variantsHtml = `<div class="variants-section">
        <div class="variants-title">Variants & Target Prices</div>
        ${variants.map((v, vi) => `
          <div class="variant-row">
            <span class="variant-name">${esc(v.name)}</span>
            <span class="variant-target">₱${Number(v.target_price).toLocaleString()}</span>
            <div class="variant-actions">
              <button title="Edit target" onclick="editVariant(${idx},${vi})">✏️</button>
              <button class="remove-v" title="Remove variant" onclick="removeVariant(${idx},${vi})">✕</button>
            </div>
          </div>
        `).join('')}
        <div class="add-variant-row">
          <input type="text" placeholder="Variant name" id="vname-${idx}">
          <input type="number" placeholder="Target ₱" id="vtarget-${idx}" style="max-width:110px">
          <button onclick="addVariant(${idx})">+ Add</button>
        </div>
      </div>`;
    } else if (p.target_price) {
      // Legacy single target — show with option to convert to variants
      variantsHtml = `<div class="variants-section">
        <div class="variants-title">Target Price</div>
        <div class="variant-row">
          <span class="variant-name">All variants</span>
          <span class="variant-target">₱${Number(p.target_price).toLocaleString()}</span>
          <div class="variant-actions">
            <button title="Edit target" onclick="editLegacyTarget(${idx})">✏️</button>
          </div>
        </div>
        <div class="add-variant-row">
          <input type="text" placeholder="Add variant name" id="vname-${idx}">
          <input type="number" placeholder="Target ₱" id="vtarget-${idx}" style="max-width:110px">
          <button onclick="addVariant(${idx})">+ Add</button>
        </div>
        <p style="font-size:0.68rem;color:var(--muted);margin-top:0.3rem">Adding a variant will switch to per-variant tracking</p>
      </div>`;
    } else {
      // No target at all — need to add variants
      variantsHtml = `<div class="variants-section">
        <div class="variants-title">Add variants with target prices</div>
        <div class="add-variant-row">
          <input type="text" placeholder="Variant name" id="vname-${idx}">
          <input type="number" placeholder="Target ₱" id="vtarget-${idx}" style="max-width:110px">
          <button onclick="addVariant(${idx})">+ Add</button>
        </div>
      </div>`;
    }

    const card = document.createElement('div');
    card.className = `product-card${disabled ? ' disabled' : ''}`;
    card.innerHTML = `
      <div class="card-top">
        <span class="card-title">${esc(p.name)}</span>
        <div class="card-badges">
          <span class="badge ${p.store}">${p.store}</span>
          ${disabled ? '<span class="badge paused">paused</span>' : ''}
        </div>
      </div>
      <div class="card-url"><a href="${esc(p.url)}" target="_blank">${esc(p.url.length > 70 ? p.url.substring(0,70) + '...' : p.url)}</a></div>
      ${variantsHtml}
      <div class="card-actions">
        <button onclick="toggleProduct(${idx})">${disabled ? '▶ Enable' : '⏸ Pause'}</button>
        <button onclick="editProductName(${idx})">✏️ Rename</button>
        <button class="remove" onclick="removeProduct(${idx})">🗑 Remove</button>
      </div>
    `;
    list.appendChild(card);
  });

  updateAddButton();
}

function updateAddButton() {
  const btn = document.getElementById('btnAdd');
  const msg = document.getElementById('limitMsg');
  if (watchlist.products.length >= MAX_PRODUCTS) {
    btn.disabled = true;
    msg.style.display = 'block';
  } else {
    btn.disabled = false;
    msg.style.display = 'none';
  }
}

// --- Product Actions ---

function addProduct() {
  const name = document.getElementById('addName').value.trim();
  const url = document.getElementById('addUrl').value.trim();
  const store = document.getElementById('addStore').value;
  hideError();

  if (!name) { showError('Enter a product name'); return; }
  if (!url) { showError('Enter the product URL'); return; }
  if (!url.toLowerCase().includes('shopee') && !url.toLowerCase().includes('lazada')) {
    showError('URL must be from Shopee or Lazada'); return;
  }
  if (watchlist.products.length >= MAX_PRODUCTS) { showError('Max 5 products reached'); return; }

  watchlist.products.push({ name, url, store, enabled: true, variants: [] });
  saveWatchlist();
  render();
  document.getElementById('addName').value = '';
  document.getElementById('addUrl').value = '';
}

function toggleProduct(idx) {
  watchlist.products[idx].enabled = !watchlist.products[idx].enabled;
  saveWatchlist();
  render();
}

function editProductName(idx) {
  const current = watchlist.products[idx].name;
  const newName = prompt('Product name:', current);
  if (newName && newName.trim()) {
    watchlist.products[idx].name = newName.trim();
    saveWatchlist();
    render();
  }
}

function removeProduct(idx) {
  if (confirm(`Remove "${watchlist.products[idx].name}"?`)) {
    watchlist.products.splice(idx, 1);
    saveWatchlist();
    render();
  }
}

// --- Variant Actions ---

function addVariant(productIdx) {
  const nameInput = document.getElementById(`vname-${productIdx}`);
  const targetInput = document.getElementById(`vtarget-${productIdx}`);
  const vname = nameInput.value.trim();
  const vtarget = parseFloat(targetInput.value);

  if (!vname) { alert('Enter variant name'); return; }
  if (!vtarget || vtarget <= 0) { alert('Enter a valid target price'); return; }

  const product = watchlist.products[productIdx];
  if (!product.variants) product.variants = [];
  product.variants.push({ name: vname, target_price: vtarget });

  // If adding first variant, remove legacy target_price
  if (product.target_price && product.variants.length === 1) {
    delete product.target_price;
  }

  saveWatchlist();
  render();
}

function editVariant(productIdx, variantIdx) {
  const variant = watchlist.products[productIdx].variants[variantIdx];
  const newTarget = prompt(`Target price for "${variant.name}":`, variant.target_price);
  if (newTarget !== null) {
    const val = parseFloat(newTarget);
    if (val > 0) {
      watchlist.products[productIdx].variants[variantIdx].target_price = val;
      saveWatchlist();
      render();
    } else {
      alert('Must be a positive number');
    }
  }
}

function removeVariant(productIdx, variantIdx) {
  const variant = watchlist.products[productIdx].variants[variantIdx];
  if (confirm(`Remove variant "${variant.name}"?`)) {
    watchlist.products[productIdx].variants.splice(variantIdx, 1);
    saveWatchlist();
    render();
  }
}

function editLegacyTarget(productIdx) {
  const current = watchlist.products[productIdx].target_price;
  const newTarget = prompt('Target price:', current);
  if (newTarget !== null) {
    const val = parseFloat(newTarget);
    if (val > 0) {
      watchlist.products[productIdx].target_price = val;
      saveWatchlist();
      render();
    } else {
      alert('Must be a positive number');
    }
  }
}

// --- Export ---

function exportJSON() {
  const blob = new Blob([JSON.stringify(watchlist, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'price_watchlist.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function resetFromFile() {
  if (!confirm('Reset watchlist from the original JSON file? This will discard any unsaved edits.')) return;
  localStorage.removeItem(STORAGE_KEY);
  try {
    const res = await fetch(WATCHLIST_PATH);
    if (res.ok) watchlist = await res.json();
  } catch(e) { watchlist = { products: [] }; }
  saveToLocal();
  render();
}

// --- Check Now & Auto-Check ---

let autoCheckInterval = null;
const AUTO_CHECK_MINUTES = 5;

async function checkNow() {
  if (!serverMode) {
    alert('Check Now requires the local server running. Start pricetracker/start.bat');
    return;
  }

  const btn = document.getElementById('btnCheck');
  const resultEl = document.getElementById('checkResult');
  btn.disabled = true;
  btn.textContent = '⏳ Checking...';
  resultEl.style.display = 'block';
  resultEl.textContent = 'Running price check (this may take 15-60 seconds)...\n';

  try {
    const res = await fetch('/api/check-now', { method: 'POST' });
    const data = await res.json();

    if (data.status === 'done') {
      resultEl.textContent = data.output || 'Check complete (no output)';
      if (data.errors) resultEl.textContent += '\n\n--- Errors ---\n' + data.errors;
    } else {
      resultEl.textContent = 'Error: ' + (data.output || data.status);
    }

    // Reload watchlist and history after check
    try {
      const wlRes = await fetch('/api/watchlist');
      if (wlRes.ok) watchlist = await wlRes.json();
      render();
    } catch(e) {}

    updateAutoCheckStatus();
  } catch(e) {
    resultEl.textContent = 'Failed to run check: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '⚡ Check Prices Now';
  }
}

function startAutoCheck() {
  if (!serverMode) return;

  updateAutoCheckStatus();
  autoCheckInterval = setInterval(() => {
    checkNow();
  }, AUTO_CHECK_MINUTES * 60 * 1000);
}

function updateAutoCheckStatus() {
  const el = document.getElementById('autoCheckStatus');
  if (!el) return;
  if (serverMode) {
    const next = new Date(Date.now() + AUTO_CHECK_MINUTES * 60 * 1000);
    el.textContent = `Auto-check every ${AUTO_CHECK_MINUTES} min | Next: ${next.toLocaleTimeString()}`;
  } else {
    el.textContent = '';
  }
}

// --- Helpers ---

function showError(msg) {
  const el = document.getElementById('formError');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError() {
  document.getElementById('formError').classList.remove('show');
}
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

init();
</script>
</body>
</html>
